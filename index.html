<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Theme -->
    <meta name="theme-color" content="#15151A" />
    <meta name="color-scheme" content="dark" />

    <!-- SEO / description -->
    <meta name="description" content="Plan strength workouts, track sets and reps, and monitor your progress — offline-first PWA." />
    <meta name="keywords" content="workout tracker, strength training, gym log, exercise, fitness, offline" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (social sharing + search previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="IronLog" />
    <meta property="og:description" content="Plan strength workouts, track sets and reps, and monitor your progress — offline-first PWA." />
    <meta property="og:image" content="https://adityakhatri.github.io/iron-log/icons/icon-512.png" />
    <meta property="og:url" content="https://adityakhatri.github.io/iron-log/" />
    <meta property="og:site_name" content="IronLog" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="IronLog" />
    <meta name="twitter:description" content="Plan strength workouts, track sets and reps, and monitor your progress — offline-first PWA." />
    <meta name="twitter:image" content="https://adityakhatri.github.io/iron-log/icons/icon-512.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="./icons/logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

    <!-- Apple PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IronLog" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png" />

    <title>IronLog</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
