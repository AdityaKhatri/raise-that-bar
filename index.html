<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Theme -->
    <meta name="theme-color" content="#0C0B0A" />
    <meta name="color-scheme" content="dark" />

    <!-- SEO / description -->
    <meta name="description" content="Strength training tracker — raise that bar. Offline-first PWA." />
    <meta name="keywords" content="workout tracker, strength training, gym log, exercise, fitness, offline" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (social sharing + search previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Raise That Bar" />
    <meta property="og:description" content="Strength training tracker — raise that bar. Offline-first PWA." />
    <meta property="og:image" content="https://app.raisethatbar.com/icons/icon-512.png" />
    <meta property="og:url" content="https://app.raisethatbar.com/" />
    <meta property="og:site_name" content="Raise That Bar" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Raise That Bar" />
    <meta name="twitter:description" content="Strength training tracker — raise that bar. Offline-first PWA." />
    <meta name="twitter:image" content="https://app.raisethatbar.com/icons/icon-512.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png" />

    <!-- Apple PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Raise That Bar" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

    <title>Raise That Bar</title>
  </head>
  <body>
    <!-- Pre-React splash — visible instantly, hidden once React mounts -->
    <div id="splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0C0B0A;z-index:9999;transition:opacity 350ms ease">
      <div style="display:flex;flex-direction:column;align-items:center;gap:15px;animation:_si 600ms cubic-bezier(.16,1,.3,1) both">
        <svg width="50" height="50" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="animation:_pulse 1.8s ease-in-out .6s infinite">
          <g transform="rotate(-11 100 100)">
            <polyline points="30,100 78,100 88,100 93,114 100,69 108,126 114,100 122,100 170,100" fill="none" stroke="#ff5a1f" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
            <rect x="42" y="62" width="16" height="76" rx="2" fill="#a09a8d"/>
            <rect x="60" y="74" width="12" height="52" rx="2" fill="#a09a8d"/>
            <rect x="128" y="74" width="12" height="52" rx="2" fill="#a09a8d"/>
            <rect x="142" y="62" width="16" height="76" rx="2" fill="#a09a8d"/>
          </g>
        </svg>
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.4em;text-transform:uppercase;color:#f5f2eb">RAISE THAT</span>
          <span style="font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;letter-spacing:-.04em;color:#ff5a1f;line-height:1">BAR</span>
        </div>
        <div style="margin-top:8px;display:flex;gap:6px">
          <div style="width:6px;height:6px;border-radius:50%;background:#ff5a1f;animation:_dot 1.2s ease-in-out .6s infinite"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:#ff5a1f;animation:_dot 1.2s ease-in-out .8s infinite"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:#ff5a1f;animation:_dot 1.2s ease-in-out 1s infinite"></div>
        </div>
      </div>
    </div>
    <style>
      @keyframes _si{0%{opacity:0;transform:scale(.85) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
      @keyframes _pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
      @keyframes _dot{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
